services:
  postgres:
    image: postgres:16-alpine
    container_name: blink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blink
      POSTGRES_PASSWORD: blink
      POSTGRES_DB: blink
    ports:
      - "5432:5432"
    volumes:
      - blink_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blink -d blink"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  blink_pg_data:
