name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run on the same ref when a new push arrives — saves
# CI minutes on rapid-fire pushes during a PR.
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      # `next build` runs the TypeScript compiler against the whole project,
      # so this catches type errors as well as build failures.
      - name: Build
        run: npx next build
